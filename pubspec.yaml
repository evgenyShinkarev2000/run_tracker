name: run_tracker
description: "Run tracker"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.4
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cancellation_token: ^2.0.1
  flutter_riverpod: ^3.1.0
  drift: ^2.30.0
  drift_flutter: ^0.2.8
  path_provider: ^2.1.5
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  go_router: ^17.0.1
  loading_animation_widget: ^1.3.0
  geolocator: ^14.0.2
  flutter_map_location_marker: ^10.2.0
  talker: ^5.1.13
  talker_flutter: ^5.1.13
  talker_riverpod_logger: ^5.1.13
  drift_db_viewer: ^2.1.0
  rxdart: ^0.28.0
  json_annotation: ^4.9.0
  infinite_scroll_pagination: ^5.1.1
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.30.0
  build_runner: ^2.10.4
  test: ^1.26.3
  json_serializable: ^6.11.2

flutter:
  uses-material-design: true
  generate: true

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
    - family: CustomIcons
      fonts:
        - asset: assets/icons/place_no_dot.ttf

  assets:
    - appsettings.json

  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
